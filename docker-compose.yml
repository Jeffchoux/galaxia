services:
  galaxia:
    build: .
    volumes:
      - ./galaxia.yml:/etc/galaxia/config.yml
      - galaxia-data:/var/lib/galaxia
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - GROQ_API_KEY
      - ANTHROPIC_API_KEY
      - TELEGRAM_BOT_TOKEN
      - TELEGRAM_CHAT_ID
    ports:
      - "3333:3333"
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    profiles: ["local-llm"]
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "11434:11434"

volumes:
  galaxia-data:
  ollama-data:
