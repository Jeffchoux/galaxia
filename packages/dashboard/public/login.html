<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Galaxia OS — Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root { color-scheme: dark; --bg:#0b0d10; --fg:#eef; --muted:#8aa; --accent:#6cf; --err:#f88; --card:#15181d; }
    * { box-sizing: border-box; }
    body { margin:0; min-height:100vh; background:var(--bg); color:var(--fg); font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; display:grid; place-items:center; }
    .card { background:var(--card); padding:2rem 2.5rem; border-radius:12px; min-width:320px; box-shadow:0 4px 40px rgba(0,0,0,.4); }
    h1 { margin:0 0 .25rem; font-size:1.5rem; letter-spacing:.5px; }
    .sub { color:var(--muted); font-size:.85rem; margin-bottom:1.5rem; }
    label { display:block; font-size:.8rem; color:var(--muted); margin:.75rem 0 .3rem; text-transform:uppercase; letter-spacing:.5px; }
    input { width:100%; padding:.6rem .75rem; background:#0b0d10; color:var(--fg); border:1px solid #2a2e34; border-radius:6px; font-size:.95rem; }
    input:focus { outline:none; border-color:var(--accent); }
    button { margin-top:1.25rem; width:100%; padding:.7rem; background:var(--accent); color:#000; border:none; border-radius:6px; font-weight:600; cursor:pointer; font-size:.95rem; }
    button:hover { background:#8cf; }
    button:disabled { opacity:.6; cursor:not-allowed; }
    .err { color:var(--err); font-size:.85rem; margin-top:.75rem; min-height:1em; }
  </style>
</head>
<body>
  <form class="card" id="login-form">
    <h1>🌌 Galaxia OS</h1>
    <div class="sub">Dashboard · owner / collaborator</div>
    <label for="userName">Username</label>
    <input id="userName" name="userName" autocomplete="username" autofocus required>
    <label for="password">Password</label>
    <input id="password" type="password" name="password" autocomplete="current-password" required>
    <button type="submit" id="submit-btn">Sign in</button>
    <div class="err" id="err"></div>
  </form>
  <script>
    const form = document.getElementById('login-form');
    const errEl = document.getElementById('err');
    const submit = document.getElementById('submit-btn');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errEl.textContent = '';
      submit.disabled = true;
      try {
        const userName = document.getElementById('userName').value.trim();
        const password = document.getElementById('password').value;
        const res = await fetch('api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userName, password }),
        });
        const body = await res.json().catch(() => ({}));
        if (!res.ok) {
          errEl.textContent = body.error || 'Login failed';
          return;
        }
        window.location.href = './';
      } catch (err) {
        errEl.textContent = String(err);
      } finally {
        submit.disabled = false;
      }
    });
  </script>
</body>
</html>
