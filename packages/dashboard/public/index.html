<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Galaxia OS — Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root { color-scheme: dark; --bg:#0b0d10; --panel:#15181d; --border:#2a2e34; --fg:#eef; --muted:#7a8a98; --accent:#6cf; --ok:#7e7; --warn:#fd7; --err:#f88; }
    * { box-sizing: border-box; }
    body { margin:0; background:var(--bg); color:var(--fg); font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }
    header { padding:1rem 1.5rem; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
    header h1 { margin:0; font-size:1.1rem; letter-spacing:.5px; font-weight:500; }
    header .user { color:var(--muted); font-size:.85rem; }
    header .user strong { color:var(--fg); }
    header a { color:var(--accent); text-decoration:none; font-size:.85rem; margin-left:1rem; }
    nav { padding:0 1.5rem; border-bottom:1px solid var(--border); display:flex; gap:1.5rem; }
    nav button { background:none; border:none; color:var(--muted); padding:.9rem 0; cursor:pointer; font-size:.9rem; border-bottom:2px solid transparent; font-family:inherit; }
    nav button.active { color:var(--fg); border-bottom-color:var(--accent); }
    nav button:hover { color:var(--fg); }
    main { padding:1.5rem; max-width:1200px; margin:auto; }
    .grid { display:grid; gap:1rem; grid-template-columns:repeat(auto-fit, minmax(240px, 1fr)); }
    .card { background:var(--panel); border:1px solid var(--border); border-radius:8px; padding:1rem 1.2rem; }
    .card h3 { margin:0 0 .5rem; font-size:.8rem; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; font-weight:500; }
    .card .big { font-size:1.8rem; font-weight:600; }
    .card .sub { font-size:.8rem; color:var(--muted); margin-top:.2rem; }
    table { width:100%; border-collapse:collapse; }
    th { text-align:left; font-size:.75rem; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; padding:.6rem .8rem; border-bottom:1px solid var(--border); font-weight:500; }
    td { padding:.7rem .8rem; border-bottom:1px solid var(--border); font-size:.9rem; }
    .status-healthy { color:var(--ok); } .status-warning { color:var(--warn); } .status-critical { color:var(--err); } .status-unknown { color:var(--muted); }
    .pill { display:inline-block; padding:.1rem .5rem; font-size:.7rem; border-radius:999px; background:#1a1e25; color:var(--muted); }
    .pill.owner { background:#2a2e34; color:var(--accent); }
    .empty { padding:3rem; text-align:center; color:var(--muted); }
    pre { background:#0b0d10; padding:.8rem; border-radius:6px; overflow-x:auto; margin:0; font-size:.78rem; border:1px solid var(--border); }
    .hint { color:var(--muted); font-size:.85rem; margin-top:.5rem; }
    .toolbar { display:flex; gap:.5rem; margin-bottom:1rem; }
    .toolbar select, .toolbar input { padding:.5rem; background:#0b0d10; color:var(--fg); border:1px solid var(--border); border-radius:6px; font-size:.85rem; }
  </style>
</head>
<body>
  <header>
    <h1>🌌 Galaxia OS — Dashboard</h1>
    <div class="user"><span id="user-info">Chargement…</span><a href="3d.html">3D view</a><a href="#" id="logout">Logout</a></div>
  </header>
  <nav>
    <button class="active" data-tab="overview">Overview</button>
    <button data-tab="projects">Projects</button>
    <button data-tab="audit">Audit</button>
    <button data-tab="missions">Missions</button>
    <button data-tab="users">Users</button>
  </nav>
  <main id="view"></main>

  <script>
    const $ = (sel) => document.querySelector(sel);
    const view = $('#view');
    let currentUser = null;

    async function api(path) {
      const res = await fetch(path);
      if (res.status === 401) { window.location.href = 'login.html'; throw new Error('unauthorized'); }
      return res.json();
    }

    async function loadMe() {
      const me = await api('api/me');
      if (!me.authenticated) { window.location.href = 'login.html'; return; }
      currentUser = me.user;
      $('#user-info').innerHTML = `<strong>${me.user.name}</strong> · ${me.user.role} · scope [${me.user.scope.join(', ')}]`;
    }

    function esc(s) {
      const d = document.createElement('div'); d.textContent = String(s ?? ''); return d.innerHTML;
    }

    async function renderOverview() {
      const [state, projects] = await Promise.all([api('api/state'), api('api/projects')]);
      const sys = state.system ?? {};
      view.innerHTML = `
        <div class="grid">
          <div class="card"><h3>CPU</h3><div class="big">${esc(sys.cpu ?? '—')}</div></div>
          <div class="card"><h3>RAM</h3><div class="big">${esc(sys.ram ?? '—')}</div></div>
          <div class="card"><h3>Disk</h3><div class="big">${esc(sys.disk ?? '—')}</div></div>
          <div class="card"><h3>PM2 online</h3><div class="big">${esc(sys.pm2Online ?? '—')}</div></div>
          <div class="card"><h3>Projects in scope</h3><div class="big">${projects.projects.length}</div><div class="sub">sur ${(state.projects ? Object.keys(state.projects).length : 0) || projects.projects.length}</div></div>
          <div class="card"><h3>Dernière mise à jour</h3><div class="big" style="font-size:1rem">${esc(state.lastUpdated ?? '—')}</div></div>
        </div>
        <div class="card" style="margin-top:1rem">
          <h3>Daily stats</h3>
          <pre>${esc(JSON.stringify(state.dailyStats ?? {}, null, 2))}</pre>
        </div>
      `;
    }

    async function renderProjects() {
      const { projects } = await api('api/projects');
      if (projects.length === 0) { view.innerHTML = '<div class="empty">Aucun projet dans votre scope.</div>'; return; }
      view.innerHTML = `<table>
        <thead><tr><th>Name</th><th>Path</th><th>GM</th><th>Status</th><th>Last cycle</th><th>Backlog</th></tr></thead>
        <tbody>${projects.map(p => `
          <tr>
            <td><strong>${esc(p.name)}</strong></td>
            <td><span class="pill">${esc(p.path)}</span></td>
            <td>${p.gm.enabled ? `<span class="pill owner">on · ${esc(p.gm.intervalMinutes ?? 30)}min</span>` : '<span class="pill">off</span>'}</td>
            <td class="status-${esc(p.runtime?.status ?? 'unknown')}">${esc(p.runtime?.status ?? 'unknown')}</td>
            <td>${esc(p.runtime?.lastCycle ?? '—')}</td>
            <td>${esc(p.runtime?.backlogCount ?? 0)}</td>
          </tr>`).join('')}
        </tbody>
      </table>`;
    }

    async function renderAudit() {
      const { entries } = await api('api/audit?n=50');
      if (entries.length === 0) { view.innerHTML = '<div class="empty">Pas d\'entrées d\'audit.</div>'; return; }
      view.innerHTML = `<table>
        <thead><tr><th>Time</th><th>Project</th><th>dataClass</th><th>task</th><th>Rule</th><th>Provider</th><th>Status</th></tr></thead>
        <tbody>${entries.slice().reverse().map(e => `
          <tr>
            <td>${esc(e.ts ?? '')}</td>
            <td>${esc(e.ctx?.projectTag ?? '—')}</td>
            <td><span class="pill">${esc(e.ctx?.dataClass ?? '—')}</span></td>
            <td><span class="pill">${esc(e.ctx?.taskType ?? '—')}</span></td>
            <td>${esc(e.decision?.matchedRule ?? '')}</td>
            <td>${esc(e.decision?.provider ?? '')}/${esc(e.decision?.model ?? '')}</td>
            <td class="status-${e.outcome === 'ok' ? 'healthy' : 'critical'}">${esc(e.outcome ?? '')}</td>
          </tr>`).join('')}
        </tbody></table>`;
    }

    async function renderMissions() {
      const { missions } = await api('api/missions');
      if (missions.length === 0) { view.innerHTML = '<div class="empty">Aucune mission.</div>'; return; }
      view.innerHTML = `<table>
        <thead><tr><th>Id</th><th>Description</th><th>Status</th><th>Created</th></tr></thead>
        <tbody>${missions.map(m => `
          <tr>
            <td><span class="pill">${esc(m.id)}</span></td>
            <td>${esc(m.description)}</td>
            <td class="status-${m.status === 'completed' ? 'healthy' : m.status === 'failed' ? 'critical' : 'warning'}">${esc(m.status)}</td>
            <td>${esc(m.createdAt)}</td>
          </tr>`).join('')}
        </tbody></table>`;
    }

    async function renderUsers() {
      const res = await fetch('api/users');
      if (res.status === 403) { view.innerHTML = '<div class="empty">Réservé à l\'owner.</div>'; return; }
      const { users, owner } = await res.json();
      view.innerHTML = `<div class="hint">Owner: <strong>${esc(owner ?? '—')}</strong></div>
      <table style="margin-top:1rem">
        <thead><tr><th>Name</th><th>Role</th><th>Scope</th><th>Telegram</th><th>Web</th></tr></thead>
        <tbody>${users.map(u => `
          <tr>
            <td><strong>${esc(u.name)}</strong></td>
            <td class="${u.role === 'owner' ? 'pill owner' : ''}">${esc(u.role)}</td>
            <td>${u.scope.map(s => `<span class="pill">${esc(s)}</span>`).join(' ')}</td>
            <td>${u.telegram ? '✅' : '—'}</td>
            <td>${u.web ? '✅' : '—'}</td>
          </tr>`).join('')}
        </tbody></table>`;
    }

    const tabs = {
      overview: renderOverview, projects: renderProjects, audit: renderAudit,
      missions: renderMissions, users: renderUsers,
    };

    document.querySelectorAll('nav button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const tab = btn.dataset.tab;
        tabs[tab]?.().catch(err => { view.innerHTML = `<div class="empty">Erreur: ${esc(err.message)}</div>`; });
      });
    });

    document.getElementById('logout').addEventListener('click', async (e) => {
      e.preventDefault();
      await fetch('api/logout', { method: 'POST' });
      window.location.href = 'login.html';
    });

    (async () => {
      await loadMe();
      renderOverview().catch(err => { view.innerHTML = `<div class="empty">Erreur: ${esc(err.message)}</div>`; });
    })();
  </script>
</body>
</html>
