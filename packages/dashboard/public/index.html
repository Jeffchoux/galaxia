<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Galaxia OS — Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root { color-scheme: dark; --bg:#0b0d10; --panel:#15181d; --border:#2a2e34; --fg:#eef; --muted:#7a8a98; --accent:#6cf; --ok:#7e7; --warn:#fd7; --err:#f88; }
    * { box-sizing: border-box; }
    body { margin:0; background:var(--bg); color:var(--fg); font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }
    header { padding:1rem 1.5rem; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
    header h1 { margin:0; font-size:1.1rem; letter-spacing:.5px; font-weight:500; }
    header .user { color:var(--muted); font-size:.85rem; }
    header .user strong { color:var(--fg); }
    header a { color:var(--accent); text-decoration:none; font-size:.85rem; margin-left:1rem; }
    nav { padding:0 1.5rem; border-bottom:1px solid var(--border); display:flex; gap:1.5rem; }
    nav button { background:none; border:none; color:var(--muted); padding:.9rem 0; cursor:pointer; font-size:.9rem; border-bottom:2px solid transparent; font-family:inherit; }
    nav button.active { color:var(--fg); border-bottom-color:var(--accent); }
    nav button:hover { color:var(--fg); }
    main { padding:1.5rem; max-width:1400px; margin:auto; }
    .grid { display:grid; gap:1rem; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); }
    .card { background:var(--panel); border:1px solid var(--border); border-radius:8px; padding:1rem 1.2rem; }
    .card h3 { margin:0 0 .5rem; font-size:.8rem; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; font-weight:500; }
    .card .big { font-size:1.8rem; font-weight:600; }
    .card .sub { font-size:.8rem; color:var(--muted); margin-top:.2rem; }
    table { width:100%; border-collapse:collapse; }
    th { text-align:left; font-size:.75rem; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; padding:.6rem .8rem; border-bottom:1px solid var(--border); font-weight:500; }
    td { padding:.7rem .8rem; border-bottom:1px solid var(--border); font-size:.9rem; }
    .status-healthy { color:var(--ok); } .status-warning { color:var(--warn); } .status-critical { color:var(--err); } .status-unknown { color:var(--muted); }
    .pill { display:inline-block; padding:.1rem .5rem; font-size:.7rem; border-radius:999px; background:#1a1e25; color:var(--muted); }
    .pill.owner { background:#2a2e34; color:var(--accent); }
    .empty { padding:3rem; text-align:center; color:var(--muted); }
    pre { background:#0b0d10; padding:.8rem; border-radius:6px; overflow-x:auto; margin:0; font-size:.78rem; border:1px solid var(--border); }
    .hint { color:var(--muted); font-size:.85rem; margin-top:.5rem; }
    .toolbar { display:flex; gap:.5rem; margin-bottom:1rem; }
    .toolbar select, .toolbar input { padding:.5rem; background:#0b0d10; color:var(--fg); border:1px solid var(--border); border-radius:6px; font-size:.85rem; }
    .split-3d { display:grid; grid-template-columns:1fr 1fr; gap:12px; height:44vh; min-height:360px; margin-bottom:1rem; }
    .panel-3d { position:relative; background:#08090e; border-radius:10px; border:1px solid var(--border); overflow:hidden; }
    .panel-3d .label { position:absolute; top:10px; left:14px; font-size:.7rem; color:var(--muted); z-index:2; letter-spacing:.1em; text-transform:uppercase; pointer-events:none; }
    .panel-3d .tooltip { position:absolute; top:10px; right:14px; font-size:.75rem; color:var(--fg); background:rgba(21,24,29,.85); padding:.3rem .6rem; border-radius:4px; border:1px solid var(--border); z-index:2; pointer-events:none; opacity:0; transition:opacity .2s; max-width:60%; }
    .panel-3d .tooltip.on { opacity:1; }
    .panel-3d canvas { display:block; width:100%; height:100%; }
    @media (max-width: 768px) { .split-3d { grid-template-columns:1fr; height:auto; } .panel-3d { height:40vh; } }
    /* Chat */
    .chat-wrap { display:flex; flex-direction:column; height:calc(100vh - 180px); min-height:500px; background:var(--panel); border:1px solid var(--border); border-radius:10px; overflow:hidden; }
    .chat-log { flex:1 1 auto; overflow-y:auto; padding:1rem 1.2rem; }
    .chat-log .turn { margin-bottom:1.1rem; max-width:80%; }
    .chat-log .turn.user { margin-left:auto; text-align:right; }
    .chat-log .turn .role { font-size:.7rem; color:var(--muted); letter-spacing:.08em; text-transform:uppercase; margin-bottom:.25rem; }
    .chat-log .turn .bubble { padding:.65rem .85rem; border-radius:10px; background:#0b0d10; border:1px solid var(--border); line-height:1.45; font-size:.93rem; white-space:pre-wrap; word-wrap:break-word; text-align:left; display:inline-block; max-width:100%; }
    .chat-log .turn.user .bubble { background:#1a2a3a; border-color:#2a4a6a; color:#cdeaff; }
    .chat-log .turn.assistant .bubble { background:#15181d; }
    .chat-log .turn.system .bubble { background:#2a1a1a; border-color:#5a2a2a; color:#ff9090; font-size:.85rem; }
    .chat-log .turn .meta { font-size:.7rem; color:var(--muted); margin-top:.25rem; }
    .chat-input { display:flex; gap:.5rem; padding:.75rem; border-top:1px solid var(--border); background:#0b0d10; }
    .chat-input textarea { flex:1; padding:.6rem .8rem; background:#15181d; color:var(--fg); border:1px solid var(--border); border-radius:6px; font-family:inherit; font-size:.95rem; resize:none; min-height:46px; max-height:180px; }
    .chat-input textarea:focus { outline:none; border-color:var(--accent); }
    .chat-input button { padding:.6rem 1.1rem; background:var(--accent); color:#000; border:none; border-radius:6px; font-weight:600; cursor:pointer; font-size:.9rem; }
    .chat-input button:disabled { opacity:.5; cursor:not-allowed; }
    .chat-log pre { white-space:pre-wrap; word-wrap:break-word; }
    .chat-log code { background:#0b0d10; padding:.1rem .35rem; border-radius:4px; font-size:.85em; }
    .chat-empty { text-align:center; color:var(--muted); padding:3rem 1rem; font-size:.95rem; }
    .chat-attachments { display:flex; flex-wrap:wrap; gap:.3rem; padding:.5rem .75rem 0; background:#0b0d10; }
    .chat-attachments:empty { display:none; }
    .att-chip { display:inline-flex; align-items:center; gap:.4rem; padding:.2rem .5rem; background:#15181d; border:1px solid var(--border); border-radius:4px; font-size:.8rem; color:var(--fg); }
    .att-chip.bubble-chip { background:rgba(20,30,40,.6); font-size:.75rem; margin-right:.3rem; }
    .att-chip .x { cursor:pointer; color:var(--muted); font-size:.85rem; line-height:1; }
    .att-chip .x:hover { color:var(--err); }
    .att-btn { padding:.6rem .8rem; background:#15181d; color:var(--fg); border:1px solid var(--border); border-radius:6px; cursor:pointer; font-size:.9rem; }
    .att-btn:hover { border-color:var(--accent); }
    .chat-log.dragover { outline:2px dashed var(--accent); outline-offset:-8px; background:rgba(102,204,255,.05); }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.170.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.170.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <header>
    <h1>🌌 Galaxia OS — Dashboard</h1>
    <div class="user"><span id="user-info">Chargement…</span><a href="3d.html">Legacy 3D</a><a href="#" id="logout">Logout</a></div>
  </header>
  <nav>
    <button data-tab="chat">💬 Chat</button>
    <button class="active" data-tab="overview">Overview</button>
    <button data-tab="projects">Projects</button>
    <button data-tab="veille">👁 Veille</button>
    <button data-tab="audit">Audit</button>
    <button data-tab="missions">Missions</button>
    <button data-tab="users">Users</button>
  </nav>
  <main id="view"></main>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls }    from 'three/addons/controls/OrbitControls.js';
    import { EffectComposer }   from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass }       from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass }  from 'three/addons/postprocessing/UnrealBloomPass.js';

    // ────────────────────────────────────────────────────────────────────
    //  Data + helpers
    // ────────────────────────────────────────────────────────────────────
    const $ = (sel) => document.querySelector(sel);
    const view = $('#view');
    let currentUser = null;

    // Colors per agent type — mirrors packages/core's AGENT_TYPES.
    const AGENT_COLORS = {
      dev:'#58A6FF', cicd:'#3FB950', test:'#FFA657', analyse:'#BC8CFF',
      controle:'#FF6B6B', veille:'#7B61FF', ideas:'#FFD700', contenu:'#FF6EFF',
      review:'#00D4FF', maintenance:'#8B949E',
    };

    // Status color for project nodes.
    const STATUS_COLORS = { healthy:'#3FB950', warning:'#FFA657', critical:'#FF6B6B', unknown:'#8B949E' };

    async function api(path) {
      const res = await fetch(path);
      if (res.status === 401) { window.location.href = 'login.html'; throw new Error('unauthorized'); }
      return res.json();
    }

    async function loadMe() {
      const me = await api('api/me');
      if (!me.authenticated) { window.location.href = 'login.html'; return; }
      currentUser = me.user;
      $('#user-info').innerHTML = `<strong>${esc(me.user.name)}</strong> · ${esc(me.user.role)} · scope [${me.user.scope.map(esc).join(', ')}]`;
    }

    function esc(s) {
      const d = document.createElement('div'); d.textContent = String(s ?? ''); return d.innerHTML;
    }

    // ────────────────────────────────────────────────────────────────────
    //  3D scenes — disposed on tab change via `activeScenes`
    // ────────────────────────────────────────────────────────────────────
    let activeScenes = [];
    function disposeActiveScenes() {
      for (const s of activeScenes) { try { s.dispose(); } catch { /* ignore */ } }
      activeScenes = [];
    }

    function makeRenderer(canvas) {
      const renderer = new THREE.WebGLRenderer({ canvas, antialias:true, alpha:true });
      renderer.setPixelRatio(window.devicePixelRatio);
      const w = canvas.clientWidth || 400;
      const h = canvas.clientHeight || 300;
      renderer.setSize(w, h, false);
      return renderer;
    }

    // ── BRAIN 3D ────────────────────────────────────────────────────────
    // Central Galaxia core + project nodes in a ring + agent nodes around
    // active projects + animated particles along edges for recent dispatches.
    function setupBrain(canvas, brainData, projectsData) {
      // ─ NEON POINT-CLOUD BRAIN ─
      // Cortex as particle cloud (same aesthetic as galaxia-os.com landing).
      // Per-agent neurons glow inside the cortex based on live GM activity,
      // synapses pulse between close neurons, UnrealBloomPass for the neon.

      const scene = new THREE.Scene();
      scene.background = null;
      const camera = new THREE.PerspectiveCamera(50, canvas.clientWidth / canvas.clientHeight, 0.1, 500);
      camera.position.set(0, 0.35, 5.2);
      camera.lookAt(0, 0, 0);

      const renderer = makeRenderer(canvas);
      renderer.setClearColor(0x000000, 0);

      const composer = new EffectComposer(renderer);
      composer.addPass(new RenderPass(scene, camera));
      const bloom = new UnrealBloomPass(new THREE.Vector2(1, 1), 1.3, 0.75, 0.08);
      composer.addPass(bloom);

      const controls = new OrbitControls(camera, canvas);
      controls.enableDamping = true;
      controls.enablePan = false;
      controls.autoRotate = true;
      controls.autoRotateSpeed = 0.35;

      // ── Cortex point cloud (same shape as landing, no stem) ─────────
      const COUNT = 6500;
      const positions = new Float32Array(COUNT * 3);
      const colors    = new Float32Array(COUNT * 3);
      const cBlue    = new THREE.Color('#4EC9FF');
      const cMagenta = new THREE.Color('#FF4E9F');
      const cCyan    = new THREE.Color('#22EEFF');
      const cPurple  = new THREE.Color('#9B6BFF');

      function brainPoint() {
        const left = Math.random() < 0.5;
        const u = Math.random() * Math.PI;
        const v = Math.random() * Math.PI * 2;
        let x = Math.sin(u) * Math.cos(v);
        let y = Math.cos(u);
        let z = Math.sin(u) * Math.sin(v);
        x *= 1.55; y *= 1.05; z *= 1.25;
        x += (left ? -0.25 : 0.25) * Math.sin(u);
        y += 0.08 * Math.sin(v * 2);
        z += 0.12 * Math.cos(u * 2);
        const bump = 0.08 * Math.sin(8 * u + 3 * v) + 0.05 * Math.cos(11 * v + u * 2);
        return [x * (1 + bump), y * (1 + bump * 0.5), z * (1 + bump)];
      }

      for (let i = 0; i < COUNT; i++) {
        const [x, y, z] = brainPoint();
        positions[i*3]   = x;
        positions[i*3+1] = y;
        positions[i*3+2] = z;
        const col = x < 0
          ? (Math.random() < 0.75 ? cBlue : cCyan)
          : (Math.random() < 0.5 ? cMagenta : (Math.random() < 0.5 ? cPurple : cBlue));
        colors[i*3]   = col.r;
        colors[i*3+1] = col.g;
        colors[i*3+2] = col.b;
      }

      const geom = new THREE.BufferGeometry();
      geom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      geom.setAttribute('color',    new THREE.BufferAttribute(colors, 3));

      // soft circular sprite
      const dotCanvas = document.createElement('canvas');
      dotCanvas.width = dotCanvas.height = 64;
      const dotCtx = dotCanvas.getContext('2d');
      const grad = dotCtx.createRadialGradient(32, 32, 0, 32, 32, 32);
      grad.addColorStop(0, 'rgba(255,255,255,1)');
      grad.addColorStop(0.35, 'rgba(255,255,255,0.55)');
      grad.addColorStop(1, 'rgba(255,255,255,0)');
      dotCtx.fillStyle = grad;
      dotCtx.fillRect(0, 0, 64, 64);
      const dotTex = new THREE.CanvasTexture(dotCanvas);
      dotTex.colorSpace = THREE.SRGBColorSpace;

      const mat = new THREE.PointsMaterial({
        size: 0.055,
        sizeAttenuation: true,
        map: dotTex,
        transparent: true,
        vertexColors: true,
        depthWrite: false,
        blending: THREE.AdditiveBlending,
      });
      const brain = new THREE.Points(geom, mat);
      brain.rotation.x = -0.05;
      scene.add(brain);

      // ── Central chip core (daemon heartbeat) ─────────────────────────
      const core = new THREE.Mesh(
        new THREE.SphereGeometry(0.09, 32, 32),
        new THREE.MeshBasicMaterial({ color: 0x4EC9FF, transparent: true, opacity: 0.95 })
      );
      core.position.set(0, 0.1, 0.25);
      scene.add(core);

      // ── Live neurons (per-agent, GM-driven) ─────────────────────────
      const projects = (projectsData?.projects ?? []).filter((p) => p);
      const allAgents = [];
      for (const proj of projects) {
        const b = brainData?.projects?.[proj.name];
        const recent = b?.recentActions ?? [];
        const dispatched = new Set(
          recent.filter((a) => a.kind === 'dispatch' && a.agent).map((a) => a.agent)
        );
        for (const agent of dispatched) {
          allAgents.push({ project: proj.name, agent, active: true });
        }
      }
      if (allAgents.length === 0) {
        for (const t of ['dev', 'review', 'analyse', 'test', 'veille']) {
          allAgents.push({ project: '(idle)', agent: t, active: false });
        }
      }

      const neurons = [];
      allAgents.forEach((na, i) => {
        const r = 0.8 + Math.random() * 0.6;
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);
        let px = r * Math.sin(phi) * Math.cos(theta) * 1.1;
        let py = r * Math.sin(phi) * Math.sin(theta) * 0.85;
        let pz = r * Math.cos(phi);
        px += (i % 2 === 0 ? -0.55 : 0.55);

        const color = AGENT_COLORS[na.agent] ?? '#4EC9FF';
        const neuron = new THREE.Mesh(
          new THREE.SphereGeometry(0.07, 16, 16),
          new THREE.MeshBasicMaterial({ color }),
        );
        neuron.position.set(px, py, pz);
        neuron.userData = { kind: 'neuron', agent: na.agent, project: na.project, active: na.active };
        scene.add(neuron);

        const glow = new THREE.Mesh(
          new THREE.SphereGeometry(0.18, 12, 12),
          new THREE.MeshBasicMaterial({ color, transparent: true, opacity: na.active ? 0.28 : 0.12 }),
        );
        glow.position.copy(neuron.position);
        scene.add(glow);

        neurons.push({ mesh: neuron, glow, agent: na.agent, project: na.project, active: na.active });
      });

      // ── Synapses between close neurons ──────────────────────────────
      const synapses = [];
      for (let i = 0; i < neurons.length; i++) {
        for (let j = i + 1; j < neurons.length; j++) {
          const a = neurons[i], b = neurons[j];
          const dist = a.mesh.position.distanceTo(b.mesh.position);
          if (dist > 2.4) continue;
          if (a.project !== b.project && Math.random() > 0.3) continue;

          const mid = a.mesh.position.clone().add(b.mesh.position).multiplyScalar(0.5);
          mid.y += 0.15 + Math.random() * 0.25;
          const curve = new THREE.QuadraticBezierCurve3(
            a.mesh.position.clone(), mid, b.mesh.position.clone()
          );
          const points = curve.getPoints(20);
          const sGeom = new THREE.BufferGeometry().setFromPoints(points);
          const ca = new THREE.Color(AGENT_COLORS[a.agent] ?? '#4EC9FF');
          const cb = new THREE.Color(AGENT_COLORS[b.agent] ?? '#FF4E9F');
          const avg = ca.clone().lerp(cb, 0.5);
          const line = new THREE.Line(sGeom, new THREE.LineBasicMaterial({
            color: avg, transparent: true, opacity: 0.35,
            blending: THREE.AdditiveBlending, depthWrite: false,
          }));
          scene.add(line);

          const signal = new THREE.Mesh(
            new THREE.SphereGeometry(0.045, 8, 8),
            new THREE.MeshBasicMaterial({ color: avg }),
          );
          scene.add(signal);

          synapses.push({
            curve, signal, line,
            progress: Math.random(),
            speed: 0.004 + Math.random() * 0.007,
          });
        }
      }

      // ── Interactions ────────────────────────────────────────────────
      const tooltipEl = canvas.parentElement.querySelector('.tooltip');
      const raycaster = new THREE.Raycaster();
      const mouse = new THREE.Vector2(-10, -10);
      const onMove = (ev) => {
        const rect = canvas.getBoundingClientRect();
        mouse.x = ((ev.clientX - rect.left) / rect.width) * 2 - 1;
        mouse.y = -((ev.clientY - rect.top) / rect.height) * 2 + 1;
      };
      canvas.addEventListener('pointermove', onMove);

      const onResize = () => {
        const w = canvas.clientWidth, h = canvas.clientHeight;
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
        renderer.setSize(w, h, false);
        composer.setSize(w, h);
        bloom.setSize(w, h);
      };
      const resizeObs = new ResizeObserver(onResize);
      resizeObs.observe(canvas);

      // ── Live brain-events SSE — flash neurons on GM dispatch / Jarvis ─
      const flashes = [];   // { neuron, endsAt, color, scale }
      const flashNeuron = (n, colorHex, durationMs = 1600) => {
        flashes.push({ neuron: n, endsAt: performance.now() + durationMs, color: new THREE.Color(colorHex) });
      };
      // Jarvis auditory flash — new temporary neuron at temporal lobe
      let jarvisMarker = null;
      const setJarvisState = (state) => {
        if (jarvisMarker) { scene.remove(jarvisMarker); jarvisMarker.geometry.dispose?.(); jarvisMarker.material.dispose?.(); jarvisMarker = null; }
        if (!state) return;
        const colors = { listening: 0x22EEFF, speaking: 0xFF4E9F };
        const col = colors[state] ?? 0x4EC9FF;
        jarvisMarker = new THREE.Mesh(
          new THREE.SphereGeometry(0.22, 20, 20),
          new THREE.MeshBasicMaterial({ color: col, transparent: true, opacity: 0.85 })
        );
        // Temporal lobe — left side, slightly down and forward
        jarvisMarker.position.set(-1.35, -0.25, 0.6);
        jarvisMarker.userData = { kind: 'jarvis', state };
        scene.add(jarvisMarker);
      };
      const es = new EventSource('api/brain-events');
      es.onmessage = (ev) => {
        try {
          const e = JSON.parse(ev.data);
          if (e.source === 'gm' && e.kind === 'dispatch' && e.agent) {
            const match = neurons.find((n) => n.agent === e.agent && (e.project ? n.project === e.project : true));
            if (match) flashNeuron(match, AGENT_COLORS[e.agent] ?? '#4EC9FF');
            // core flash on every GM event
            core.userData.flashEndsAt = performance.now() + 900;
          } else if (e.source === 'gm') {
            core.userData.flashEndsAt = performance.now() + 500;
          } else if (e.source === 'jarvis' && e.event === 'listening') {
            setJarvisState('listening');
          } else if (e.source === 'jarvis' && e.event === 'speaking') {
            setJarvisState('speaking');
            setTimeout(() => setJarvisState(null), 6000);
          }
        } catch { /* ignore malformed */ }
      };
      es.onerror = () => { /* auto-reconnect by browser */ };

      // ── Animation loop ──────────────────────────────────────────────
      let raf = 0;
      const start = performance.now();
      function tick() {
        raf = requestAnimationFrame(tick);
        const t = (performance.now() - start) / 1000;
        const now = performance.now();

        // Core pulse (daemon heartbeat) + GM flash on top
        const coreFlash = core.userData.flashEndsAt && now < core.userData.flashEndsAt
          ? (core.userData.flashEndsAt - now) / 900 : 0;
        const pulse = 0.75 + Math.sin(t * 3) * 0.25 + coreFlash * 0.5;
        core.scale.setScalar(pulse);
        core.material.opacity = 0.7 + Math.sin(t * 3) * 0.3 + coreFlash * 0.25;

        // Neuron pulsing + any active flash boost
        for (let i = 0; i < neurons.length; i++) {
          const n = neurons[i];
          const flash = flashes.find((f) => f.neuron === n && now < f.endsAt);
          const flashAmt = flash ? (flash.endsAt - now) / 1600 : 0;
          const amp = (n.active ? 0.3 : 0.12) + flashAmt * 0.7;
          const scale = 1 + Math.sin(t * 3 + i * 0.7) * amp + flashAmt * 0.8;
          n.glow.scale.setScalar(scale);
          n.glow.material.opacity = (n.active ? 0.22 : 0.1) + Math.sin(t * 3 + i * 0.7) * 0.08 + flashAmt * 0.4;
        }
        // Cleanup expired flashes
        for (let i = flashes.length - 1; i >= 0; i--) {
          if (now >= flashes[i].endsAt) flashes.splice(i, 1);
        }
        // Jarvis marker pulse
        if (jarvisMarker) {
          const j = 1 + Math.sin(t * 8) * 0.25;
          jarvisMarker.scale.setScalar(j);
          jarvisMarker.material.opacity = 0.7 + Math.sin(t * 8) * 0.3;
        }

        // Synapse signals travel
        for (const s of synapses) {
          s.progress += s.speed;
          if (s.progress > 1) s.progress = 0;
          const p = s.curve.getPoint(s.progress);
          s.signal.position.copy(p);
        }

        // Hover tooltip on neurons
        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(neurons.map((n) => n.mesh), false);
        if (intersects.length && tooltipEl) {
          const d = intersects[0].object.userData;
          tooltipEl.textContent = d.project === '(idle)'
            ? `🧬 ${d.agent} (idle)`
            : `🧬 ${d.agent} → ${d.project}`;
          tooltipEl.classList.add('on');
        } else if (tooltipEl) {
          tooltipEl.classList.remove('on');
        }

        controls.update();
        composer.render();
      }
      tick();

      return {
        dispose() {
          cancelAnimationFrame(raf);
          resizeObs.disconnect();
          canvas.removeEventListener('pointermove', onMove);
          try { es.close(); } catch { /* ignore */ }
          controls.dispose();
          renderer.dispose();
          composer.dispose?.();
          scene.traverse((o) => {
            if (o.geometry) o.geometry.dispose?.();
            if (o.material) (Array.isArray(o.material) ? o.material : [o.material]).forEach((m) => m.dispose?.());
          });
        },
      };
    }

    // ── GALAXY 3D ───────────────────────────────────────────────────────
    // Projects as planets in a star field — adapted from the legacy 3d.html
    // for a canvas instead of a full page.
    function setupGalaxy(canvas, projectsData, stateData) {
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x000008);
      const camera = new THREE.PerspectiveCamera(60, canvas.clientWidth/canvas.clientHeight, 0.1, 600);
      camera.position.set(0, 14, 24);

      const renderer = makeRenderer(canvas);
      const controls = new OrbitControls(camera, canvas);
      controls.enableDamping = true;
      controls.enablePan = false;
      controls.autoRotate = true;
      controls.autoRotateSpeed = 0.35;

      scene.add(new THREE.AmbientLight(0xffffff, 0.4));
      const sun = new THREE.PointLight(0xffc080, 2.5, 80);
      sun.position.set(0, 0, 0);
      scene.add(sun);

      // Sun at the center — Galaxia herself.
      const sunMesh = new THREE.Mesh(
        new THREE.SphereGeometry(1.4, 32, 32),
        new THREE.MeshBasicMaterial({ color:0xffdc9a }),
      );
      scene.add(sunMesh);

      // Star background — sparse random points.
      const starCount = 500;
      const starPos = new Float32Array(starCount * 3);
      for (let i = 0; i < starCount; i++) {
        const r = 80 + Math.random() * 100;
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);
        starPos[i*3]   = r * Math.sin(phi) * Math.cos(theta);
        starPos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
        starPos[i*3+2] = r * Math.cos(phi);
      }
      const starGeo = new THREE.BufferGeometry();
      starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
      const starMat = new THREE.PointsMaterial({ color:0xffffff, size:0.5, transparent:true, opacity:0.7 });
      scene.add(new THREE.Points(starGeo, starMat));

      // Planets — one per project in scope.
      const projects = (projectsData?.projects ?? []).filter((p) => p);
      const runtimeMap = stateData?.projects ?? {};
      const n = projects.length || 1;
      const planets = [];
      projects.forEach((proj, i) => {
        const angle = (i / n) * Math.PI * 2;
        const orbit = 6 + i * 2.2;
        const runtime = runtimeMap[proj.name] ?? {};
        const status = runtime.status ?? 'unknown';
        const color = STATUS_COLORS[status] ?? STATUS_COLORS.unknown;
        const size = 0.5 + Math.min((runtime.backlogCount ?? 0) / 6, 1.2);
        const mesh = new THREE.Mesh(
          new THREE.SphereGeometry(size, 24, 24),
          new THREE.MeshStandardMaterial({ color, emissive:color, emissiveIntensity:0.15, roughness:0.4 }),
        );
        mesh.position.set(Math.cos(angle) * orbit, Math.sin(angle * 0.4) * 0.6, Math.sin(angle) * orbit);
        mesh.userData = { kind:'project', name:proj.name, status, backlog:runtime.backlogCount ?? 0 };
        scene.add(mesh);
        // Orbit ring (faint).
        const ring = new THREE.Mesh(
          new THREE.RingGeometry(orbit - 0.02, orbit + 0.02, 64),
          new THREE.MeshBasicMaterial({ color:0x2a2e34, side:THREE.DoubleSide, transparent:true, opacity:0.5 }),
        );
        ring.rotation.x = Math.PI / 2;
        scene.add(ring);
        planets.push({ mesh, orbit, baseAngle:angle, speed:0.0008 + i * 0.00015 });
      });

      if (projects.length === 0) {
        const emptyRing = new THREE.Mesh(
          new THREE.RingGeometry(4, 4.2, 64),
          new THREE.MeshBasicMaterial({ color:0x8b949e, transparent:true, opacity:0.2, side:THREE.DoubleSide }),
        );
        emptyRing.rotation.x = Math.PI / 2;
        scene.add(emptyRing);
      }

      const tooltipEl = canvas.parentElement.querySelector('.tooltip');
      const raycaster = new THREE.Raycaster();
      const mouse = new THREE.Vector2(-10, -10);
      const onMove = (ev) => {
        const rect = canvas.getBoundingClientRect();
        mouse.x = ((ev.clientX - rect.left) / rect.width) * 2 - 1;
        mouse.y = -((ev.clientY - rect.top) / rect.height) * 2 + 1;
      };
      canvas.addEventListener('pointermove', onMove);

      const onResize = () => {
        const w = canvas.clientWidth, h = canvas.clientHeight;
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
        renderer.setSize(w, h, false);
      };
      const resizeObs = new ResizeObserver(onResize);
      resizeObs.observe(canvas);

      let raf = 0;
      const start = performance.now();
      function tick() {
        raf = requestAnimationFrame(tick);
        const t = (performance.now() - start) / 1000;
        sunMesh.rotation.y += 0.002;
        sunMesh.material.color.setHSL(0.09 + Math.sin(t) * 0.02, 0.7, 0.65);
        for (const p of planets) {
          const angle = p.baseAngle + t * p.speed * 80;
          p.mesh.position.x = Math.cos(angle) * p.orbit;
          p.mesh.position.z = Math.sin(angle) * p.orbit;
          p.mesh.rotation.y += 0.01;
        }
        raycaster.setFromCamera(mouse, camera);
        const hits = raycaster.intersectObjects(planets.map((p) => p.mesh), false);
        if (hits.length && tooltipEl) {
          const d = hits[0].object.userData;
          tooltipEl.textContent = `${d.name} · ${d.status} · backlog:${d.backlog}`;
          tooltipEl.classList.add('on');
        } else if (tooltipEl) {
          tooltipEl.classList.remove('on');
        }
        controls.update();
        renderer.render(scene, camera);
      }
      tick();

      return {
        dispose() {
          cancelAnimationFrame(raf);
          resizeObs.disconnect();
          canvas.removeEventListener('pointermove', onMove);
          renderer.dispose();
          scene.traverse((o) => {
            if (o.geometry) o.geometry.dispose?.();
            if (o.material) (Array.isArray(o.material) ? o.material : [o.material]).forEach((m) => m.dispose?.());
          });
        },
      };
    }

    // ────────────────────────────────────────────────────────────────────
    //  Chat tab
    // ────────────────────────────────────────────────────────────────────
    async function renderChat() {
      disposeActiveScenes();
      view.innerHTML = `
        <div class="chat-wrap">
          <div class="chat-log" id="chat-log"></div>
          <div class="chat-attachments" id="chat-attachments"></div>
          <div class="chat-input">
            <button class="att-btn" id="chat-attach" title="Joindre des fichiers">📎</button>
            <input type="file" id="chat-file-input" multiple style="display:none">
            <textarea id="chat-text" placeholder="Parle à Galaxia… (Entrée pour envoyer, Shift+Entrée = saut de ligne, glisser-déposer pour joindre)" autofocus></textarea>
            <button id="chat-send">Envoyer</button>
          </div>
        </div>
      `;
      const log = document.getElementById('chat-log');
      const input = document.getElementById('chat-text');
      const sendBtn = document.getElementById('chat-send');
      const attachBtn = document.getElementById('chat-attach');
      const fileInput = document.getElementById('chat-file-input');
      const attList = document.getElementById('chat-attachments');
      let pendingAttachments = [];  // { id, name, size, mime, storedAt } from upload endpoint

      function refreshAttChips() {
        attList.innerHTML = pendingAttachments.map((a, i) => `
          <span class="att-chip">📎 ${esc(a.name)} · ${(a.size/1024).toFixed(1)} KiB
            <span class="x" data-idx="${i}">✕</span>
          </span>
        `).join('');
        attList.querySelectorAll('.x').forEach(el => {
          el.addEventListener('click', () => {
            const idx = Number(el.dataset.idx);
            pendingAttachments.splice(idx, 1);
            refreshAttChips();
          });
        });
      }

      async function uploadFiles(files) {
        const arr = Array.from(files);
        if (arr.length === 0) return;
        attachBtn.disabled = true;
        for (const f of arr) {
          try {
            const res = await fetch('api/chat/upload?name=' + encodeURIComponent(f.name), {
              method: 'POST',
              headers: { 'Content-Type': f.type || 'application/octet-stream' },
              body: f,
            });
            const data = await res.json();
            if (data.attachment) pendingAttachments.push(data.attachment);
            else appendTurn({ role:'system', text:`Upload ${f.name} échoué: ${data.error ?? res.status}`, ts:new Date().toISOString() });
          } catch (err) {
            appendTurn({ role:'system', text:`Upload ${f.name} échoué: ${err.message}`, ts:new Date().toISOString() });
          }
        }
        attachBtn.disabled = false;
        refreshAttChips();
      }

      attachBtn.addEventListener('click', () => fileInput.click());
      fileInput.addEventListener('change', (e) => { uploadFiles(e.target.files); e.target.value = ''; });
      // Drag-drop on the log area.
      ['dragenter','dragover'].forEach(ev => log.addEventListener(ev, (e) => { e.preventDefault(); log.classList.add('dragover'); }));
      ['dragleave','drop'].forEach(ev => log.addEventListener(ev, (e) => { e.preventDefault(); log.classList.remove('dragover'); }));
      log.addEventListener('drop', (e) => { if (e.dataTransfer?.files?.length) uploadFiles(e.dataTransfer.files); });

      // Load recent history.
      try {
        const { messages } = await api('api/chat/history?n=200');
        if (!messages || messages.length === 0) {
          log.innerHTML = '<div class="chat-empty">Aucune conversation encore — envoie un message pour démarrer.</div>';
        } else {
          for (const m of messages) appendTurn(m);
          scrollToBottom();
        }
      } catch (err) {
        log.innerHTML = `<div class="chat-empty">Erreur chargement historique: ${esc(err.message)}</div>`;
      }

      async function sendMessage() {
        const text = input.value.trim();
        if (!text && pendingAttachments.length === 0) return;
        const attsToSend = pendingAttachments.slice();
        input.value = '';
        input.style.height = 'auto';
        pendingAttachments = [];
        refreshAttChips();
        sendBtn.disabled = true;

        // Optimistic user bubble.
        const tempUser = { id:'tmp-'+Date.now(), role:'user', text, ts:new Date().toISOString(), attachments: attsToSend };
        if (log.querySelector('.chat-empty')) log.innerHTML = '';
        appendTurn(tempUser);
        // Placeholder thinking bubble.
        const thinkingId = 'thinking-' + Date.now();
        log.insertAdjacentHTML('beforeend', `
          <div class="turn assistant" id="${thinkingId}">
            <div class="role">Galaxia</div>
            <div class="bubble" style="opacity:.7">⏳ réfléchit…</div>
          </div>
        `);
        scrollToBottom();

        try {
          const res = await fetch('api/chat', {
            method:'POST',
            headers:{ 'Content-Type':'application/json' },
            body: JSON.stringify({ message: text, attachments: attsToSend }),
          });
          const data = await res.json();
          document.getElementById(thinkingId)?.remove();
          if (data.assistantMessage) appendTurn(data.assistantMessage);
          else if (data.error) appendTurn({ role:'system', text:`Erreur: ${data.error}`, ts:new Date().toISOString() });
        } catch (err) {
          document.getElementById(thinkingId)?.remove();
          appendTurn({ role:'system', text:`Erreur réseau: ${err.message}`, ts:new Date().toISOString() });
        } finally {
          sendBtn.disabled = false;
          input.focus();
          scrollToBottom();
        }
      }

      sendBtn.addEventListener('click', sendMessage);
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
      });
      // Auto-grow textarea.
      input.addEventListener('input', () => {
        input.style.height = 'auto';
        input.style.height = Math.min(input.scrollHeight, 180) + 'px';
      });
    }

    function appendTurn(m) {
      const log = document.getElementById('chat-log');
      if (!log) return;
      const role = m.role === 'user' ? 'user' : (m.role === 'system' ? 'system' : 'assistant');
      const roleLabel = role === 'user' ? 'Toi' : (role === 'system' ? 'Système' : 'Galaxia');
      const ts = m.ts ? new Date(m.ts).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' }) : '';
      const metaLine = m.meta
        ? `${esc(ts)} · ${esc(m.meta.provider ?? '')}${m.meta.transport ? '/'+esc(m.meta.transport) : ''}${m.meta.matchedRule ? ' · '+esc(m.meta.matchedRule) : ''}`
        : esc(ts);
      const attachmentsHtml = (m.attachments ?? []).length > 0
        ? `<div style="margin-bottom:.35rem">${m.attachments.map(a => `<span class="att-chip bubble-chip">📎 ${esc(a.name)} · ${(a.size/1024).toFixed(1)} KiB</span>`).join('')}</div>`
        : '';
      log.insertAdjacentHTML('beforeend', `
        <div class="turn ${role}">
          <div class="role">${esc(roleLabel)}</div>
          <div class="bubble">${attachmentsHtml}${renderChatText(m.text ?? '')}</div>
          <div class="meta">${metaLine}</div>
        </div>
      `);
    }

    function renderChatText(text) {
      // Minimal markdown-ish: escape HTML, then keep ```code``` blocks and
      // inline `code`. No dep — stays fast + safe. Line breaks preserved
      // by CSS `white-space:pre-wrap` on .bubble.
      const escaped = esc(text);
      // ```lang\n...\n``` → <pre><code>...
      const withFences = escaped.replace(/```(\w*)\n?([\s\S]*?)```/g,
        (_m, _lang, code) => `<pre><code>${code.replace(/^\n/, '').replace(/\n$/, '')}</code></pre>`);
      // `inline` → <code>inline</code> (only outside <pre> blocks)
      return withFences.replace(/(?<!<pre><code>[\s\S]*?)`([^`\n]+)`/g, '<code>$1</code>');
    }

    function scrollToBottom() {
      const log = document.getElementById('chat-log');
      if (log) log.scrollTop = log.scrollHeight;
    }

                </div>
                ${f.url ? `<a href="${esc(f.url)}" target="_blank" rel="noopener" style="color:var(--accent);font-size:.8rem;white-space:nowrap">ouvrir ↗</a>` : ''}
              </div>
            </div>
          `).join('');
        } catch (err) {
          list.innerHTML = `<div class="empty">Erreur: ${esc(err.message)}</div>`;
        }
      }

      filterEl.addEventListener('change', reload);

      // Soumission inline : POST /api/chat ne convient pas ici — le
      // watcher ingest côté serveur n'a pas encore d'endpoint POST
      // dashboard public (ingestion se fait via /watch Telegram en v1).
      // On expose un raccourci : on copie le texte dans un /api/chat
      // avec un préfixe explicite pour que le user envoie via le bot.
      sendBtn.addEventListener('click', async () => {
        const text = input.value.trim();
        if (!text) return;
        sendBtn.disabled = true; sendBtn.textContent = '⏳';
        try {
          const res = await fetch('api/watch', {
            method:'POST',
            headers:{ 'Content-Type':'application/json' },
            body: JSON.stringify({ text }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error ?? 'erreur');
          input.value = '';
          sendBtn.textContent = '✓';
          setTimeout(async () => { sendBtn.textContent = '/watch'; sendBtn.disabled = false; await reload(); }, 800);
        } catch (err) {
          sendBtn.textContent = '✗'; sendBtn.disabled = false;
          alert('Erreur: ' + err.message);
        }
      });

      reload();
    }

    const tabs = {
      chat: renderChat,
      overview: renderOverview, projects: renderProjects,
      veille: renderVeille, audit: renderAudit,
      missions: renderMissions, users: renderUsers,
    };

    document.querySelectorAll('nav button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const tab = btn.dataset.tab;
        tabs[tab]?.().catch(err => { disposeActiveScenes(); view.innerHTML = `<div class="empty">Erreur: ${esc(err.message)}</div>`; });
      });
    });

    document.getElementById('logout').addEventListener('click', async (e) => {
      e.preventDefault();
      await fetch('api/logout', { method: 'POST' });
      window.location.href = 'login.html';
    });

    window.addEventListener('beforeunload', disposeActiveScenes);

    (async () => {
      await loadMe();
      renderOverview().catch(err => { view.innerHTML = `<div class="empty">Erreur: ${esc(err.message)}</div>`; });
    })();
  </script>
</body>
</html>
