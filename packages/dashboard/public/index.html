<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GALAXIA — 3D Command Center</title>
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
body { background:#000; overflow:hidden; font-family:'Inter',system-ui,sans-serif; color:#fff; }
#c { display:block; width:100vw; height:100vh; }

/* ── TOP BAR ── */
#topbar {
  position:fixed; top:0; left:0; right:0; height:56px;
  background:rgba(5,5,15,.88); backdrop-filter:blur(18px);
  border-bottom:1px solid rgba(255,255,255,.07);
  display:flex; align-items:center; padding:0 24px; gap:20px; z-index:100;
}
.tb-logo {
  font-size:20px; font-weight:800; letter-spacing:.2em;
  background:linear-gradient(90deg,#7B61FF,#00D4FF,#FF6EFF,#7B61FF);
  background-size:300%; -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  animation:logo-shift 6s linear infinite;
  user-select:none;
}
@keyframes logo-shift { to { background-position:300% center; } }
.tb-sep { width:1px; height:24px; background:rgba(255,255,255,.1); flex-shrink:0; }
.metric { display:flex; align-items:center; gap:7px; }
.m-lbl { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:rgba(255,255,255,.4); }
.m-track { width:64px; height:4px; background:rgba(255,255,255,.08); border-radius:2px; overflow:hidden; }
.m-fill { height:100%; border-radius:2px; transition:width 1.2s ease; }
.m-fill.cpu { background:linear-gradient(90deg,#58A6FF,#7B61FF); }
.m-fill.ram { background:linear-gradient(90deg,#BC8CFF,#FF6EFF); }
.m-fill.disk { background:linear-gradient(90deg,#FFA657,#FF6B6B); }
.m-val { font-size:14px; font-weight:700; color:rgba(255,255,255,.85); min-width:42px; }
.tb-right { margin-left:auto; display:flex; align-items:center; gap:12px; }
.conn-status { font-size:11px; padding:3px 10px; border-radius:5px; font-weight:700; transition:all .3s; }
.conn-status.connected { background:rgba(63,185,80,.12); border:1px solid rgba(63,185,80,.3); color:#3FB950; }
.conn-status.disconnected { background:rgba(255,107,107,.12); border:1px solid rgba(255,107,107,.3); color:#FF6B6B; }

/* ── LABELS OVERLAY ── */
#labels { position:fixed; inset:56px 0 44px 0; pointer-events:none; z-index:10; transition:opacity .5s; }
.plabel { position:absolute; transform:translate(-50%,-50%); pointer-events:none; text-align:center; transition:opacity .3s; }
.pl-name { font-size:12px; font-weight:700; letter-spacing:.04em; white-space:nowrap;
  text-shadow:0 0 20px currentColor, 0 2px 8px rgba(0,0,0,.9); }
.pl-sub { display:inline-flex; align-items:center; gap:4px;
  font-size:9px; padding:2px 7px; border-radius:7px; margin-top:3px;
  background:rgba(0,0,0,.6); border:1px solid rgba(255,255,255,.1); white-space:nowrap; }
.pl-dot { width:5px; height:5px; border-radius:50%; }

/* ── HINT ── */
#hint { position:fixed; bottom:52px; left:50%; transform:translateX(-50%);
  font-size:11px; color:rgba(255,255,255,.25); letter-spacing:.04em; pointer-events:none;
  transition:opacity .5s; }

/* ── SIDE PANEL ── */
#sidepanel {
  position:fixed; top:56px; right:0; bottom:44px; width:320px;
  background:rgba(4,4,16,.9); backdrop-filter:blur(20px);
  border-left:1px solid rgba(255,255,255,.06);
  display:flex; flex-direction:column;
  transform:translateX(100%);
  transition:transform .4s cubic-bezier(.4,0,.2,1);
  z-index:200; pointer-events:none;
  overflow:hidden;
}
#sidepanel.open { transform:translateX(0); pointer-events:all; }
#sp-header {
  padding:16px; border-bottom:1px solid rgba(255,255,255,.06);
  display:flex; align-items:center; gap:12px;
}
#sp-icon { width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:17px; }
#sp-name { font-size:15px; font-weight:700; }
#sp-meta { font-size:10px; color:rgba(255,255,255,.35); margin-top:2px; }
#sp-close { margin-left:auto; background:none; border:1px solid rgba(255,255,255,.1); color:rgba(255,255,255,.4); width:26px; height:26px; border-radius:5px; cursor:pointer; font-size:13px; display:flex; align-items:center; justify-content:center; transition:all .15s; }
#sp-close:hover { background:rgba(255,255,255,.08); color:#fff; }

#sp-stats {
  display:grid; grid-template-columns:1fr 1fr; gap:8px;
  padding:12px 16px; border-bottom:1px solid rgba(255,255,255,.06);
}
.sp-stat { background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.06); border-radius:8px; padding:10px; }
.sp-stat-label { font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:rgba(255,255,255,.3); margin-bottom:4px; }
.sp-stat-val { font-size:16px; font-weight:700; }

#sp-agents { flex:1; overflow-y:auto; padding:10px 14px; display:flex; flex-direction:column; gap:6px; }
#sp-agents::-webkit-scrollbar { width:3px; }
#sp-agents::-webkit-scrollbar-thumb { background:rgba(255,255,255,.08); border-radius:2px; }
.ag-card {
  background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.06);
  border-radius:8px; padding:10px; transition:border-color .2s;
}
.ag-card.working { border-color:rgba(63,185,80,.3); }
.ag-card.talking { border-color:rgba(88,166,255,.35); }
.ag-card.sleeping { opacity:.4; }
.ag-row { display:flex; align-items:center; gap:8px; margin-bottom:5px; }
.ag-av { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; position:relative; flex-shrink:0; }
.ag-ring { position:absolute; inset:-3px; border-radius:50%; border:2px solid transparent; }
.ag-card.working .ag-ring { border-color:#3FB950; animation:spin 3s linear infinite; }
.ag-card.talking .ag-ring { border-color:#58A6FF; animation:spin 2s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.ag-nm { font-size:11px; font-weight:600; }
.ag-st { font-size:9px; color:rgba(255,255,255,.35); margin-top:1px; }
.ag-task { font-size:9px; color:rgba(255,255,255,.4); line-height:1.4; border-left:2px solid rgba(255,255,255,.08); padding-left:7px; }
.ag-prog { height:2px; background:rgba(255,255,255,.06); border-radius:1px; overflow:hidden; margin-top:6px; }
.ag-bar { height:100%; border-radius:1px; transition:width .4s linear; }

#sp-log { height:170px; border-top:1px solid rgba(255,255,255,.06); display:flex; flex-direction:column; }
.log-hdr { padding:8px 14px; font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:rgba(255,255,255,.25); display:flex; justify-content:space-between; }
.log-cnt { color:#3FB950; }
#log-list { flex:1; overflow-y:auto; padding:0 12px 6px; }
#log-list::-webkit-scrollbar { width:3px; }
#log-list::-webkit-scrollbar-thumb { background:rgba(255,255,255,.06); border-radius:2px; }
.log-row { padding:4px 0; border-bottom:1px solid rgba(255,255,255,.03); animation:log-in .15s ease; }
@keyframes log-in { from{opacity:0;transform:translateY(-3px)} to{opacity:1;transform:none} }
.log-t { font-size:8px; color:rgba(255,255,255,.18); }
.log-a { font-size:9px; font-weight:600; }
.log-m { font-size:9px; color:rgba(255,255,255,.35); line-height:1.4; }

/* ── BOTTOM BAR ── */
#bottombar {
  position:fixed; bottom:0; left:0; right:0; height:44px;
  background:rgba(5,5,15,.88); backdrop-filter:blur(18px);
  border-top:1px solid rgba(255,255,255,.07);
  display:flex; align-items:center; padding:0 24px; gap:16px; z-index:100;
  overflow:hidden;
}
#ticker {
  flex:1; font-size:11px; color:rgba(255,255,255,.4); white-space:nowrap;
  overflow:hidden; text-overflow:ellipsis;
}
#ticker span { animation:ticker-in .3s ease; display:inline; }
@keyframes ticker-in { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
#bottombar .bb-stats {
  font-size:11px; color:rgba(255,255,255,.3); white-space:nowrap;
  display:flex; gap:14px;
}
.bb-stat { display:flex; align-items:center; gap:4px; }
.bb-dot { width:6px; height:6px; border-radius:50%; }

/* ── MOBILE ── */
@media (max-width:768px) {
  #topbar { padding:0 12px; gap:10px; height:48px; }
  .tb-logo { font-size:16px; letter-spacing:.15em; }
  .metric { display:none; }
  .metric:first-of-type { display:flex; }
  #sidepanel { width:100%; top:48px; bottom:40px; }
  #bottombar { height:40px; padding:0 12px; }
  #hint { bottom:48px; font-size:10px; }
  #labels { top:48px; bottom:40px; }
}
</style>
</head>
<body>
<canvas id="c"></canvas>

<header id="topbar">

  <div class="tb-sep"></div>
  <div class="metric">
    <span class="m-lbl">CPU</span>

    <span class="m-lbl">Disk</span>
    <div class="m-track"><div class="m-fill disk" id="b-disk"></div></div>
    <span class="m-val" id="v-disk">--</span>
  </div>
  <div class="tb-right">
    <span class="conn-status disconnected" id="conn-status">Connecting...</span>
  </div>
</header>

<div id="labels"></div>
<div id="hint">Click a planet to inspect -- Scroll to zoom -- Drag to rotate</div>

<div id="sidepanel">
  <div id="sp-header">
    <div id="sp-icon"></div>
    <div style="flex:1">
      <div id="sp-name">--</div>

    <div class="sp-stat"><div class="sp-stat-label">Bugs Fixed</div><div class="sp-stat-val" id="sp-bugs">--</div></div>

  <div id="sp-agents"></div>

    <div class="log-hdr"><span>Activity Log</span><span class="log-cnt" id="log-cnt">0</span></div>

</div>

<footer id="bottombar">
  <div id="ticker"><span>GALAXIA Command Center initialized</span></div>
  <div class="bb-stats">
    <div class="bb-stat"><div class="bb-dot" style="background:#3FB950"></div> <span id="bb-healthy">0</span> healthy</div>
    <div class="bb-stat"><div class="bb-dot" style="background:#FFA657"></div> <span id="bb-warning">0</span> warning</div>
    <div class="bb-stat"><div class="bb-dot" style="background:#FF6B6B"></div> <span id="bb-critical">0</span> critical</div>
  </div>
</footer>

<script type="importmap">

    "three": "https://unpkg.com/three@0.170.0/build/three.module.js",

}
</script>
<script type="module">

      agents: [

  },

    'Data Warehouse replication lag detected',

    'Orchestrator cycle completed in 4.2s',
  ],
  lastUpdated: new Date().toISOString(),
};

// ============================================================
//  STATE
// ============================================================
let galaxiaState = null;
let selectedProject = null;
let logItems = [];
let usingDemo = true;
let eventSource = null;

const STATUS_COLORS = {
  healthy: '#3FB950',
  warning: '#FFA657',
  critical: '#FF6B6B',
  unknown: '#8B949E',
};

const PLANET_COLORS = [
  '#7B61FF', '#00D4FF', '#FF6EFF', '#3FB950', '#FFA657',
  '#58A6FF', '#FF6B6B', '#BC8CFF', '#00FFB3', '#FFD700',
];

const MSG_POOL = [
  'Analysis complete', 'Result ready', 'Retrying...', 'Module loaded',
  'Task forwarded', 'Verification OK', 'Endpoint healthy', 'Log analyzed',
  'Pipeline OK', 'Cache invalidated', 'Build succeeded', 'Deploy initiated',
  'Tests passing', 'Metrics collected', 'Backup complete', 'Scan finished',
];

// ============================================================
//  THREE.JS SETUP
// ============================================================
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.1, 600);
camera.position.set(0, 20, 32);

// Lighting
scene.add(new THREE.AmbientLight(0x111128, 2.5));
const sunLight = new THREE.PointLight(0xffffff, 8, 0);
sunLight.position.set(0, 5, 0);
scene.add(sunLight);
const rimLight = new THREE.DirectionalLight(0x7B61FF, 1.2);
rimLight.position.set(-10, 10, -10);
scene.add(rimLight);
const fillLight = new THREE.DirectionalLight(0x00D4FF, 0.5);
fillLight.position.set(10, -5, 10);
scene.add(fillLight);

// ============================================================
//  STARFIELD
// ============================================================
function makeStarfield() {
  const N = 8000;
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(N * 3);
  const col = new Float32Array(N * 3);
  const sizes = new Float32Array(N);
  const c = new THREE.Color();
  for (let i = 0; i < N; i++) {
    const r = 50 + Math.random() * 250;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    pos[i * 3] = r * Math.sin(phi) * Math.cos(theta);
    pos[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
    pos[i * 3 + 2] = r * Math.cos(phi);
    c.setHSL(0.55 + Math.random() * 0.15, 0.3 + Math.random() * 0.4, 0.6 + Math.random() * 0.4);
    col[i * 3] = c.r; col[i * 3 + 1] = c.g; col[i * 3 + 2] = c.b;
    sizes[i] = Math.random() * 1.5 + 0.3;
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('color', new THREE.BufferAttribute(col, 3));
  const mat = new THREE.PointsMaterial({
    size: 0.15, sizeAttenuation: true, vertexColors: true,
    transparent: true, opacity: 0.6, depthWrite: false,
  });
  return new THREE.Points(geo, mat);
}
const starfield = makeStarfield();
scene.add(starfield);

// ============================================================
//  GALAXY SPIRAL
// ============================================================
function makeGalaxy() {
  const N = 15000, arms = 3, R = 28;
  const pos = new Float32Array(N * 3);
  const col = new Float32Array(N * 3);
  const c = new THREE.Color();
  for (let i = 0; i < N; i++) {
    const r = Math.pow(Math.random(), 1.6) * R;
    const arm = (i % arms) * (Math.PI * 2 / arms);
    const spin = r * 0.35;
    const spread = Math.random() * 0.4;
    const a = arm + spin + (Math.random() - 0.5) * spread * (1 - r / R);
    const rx = (Math.random() - 0.5) * 0.3 * (r * 0.12 + 0.3);
    const ry = (Math.random() - 0.5) * 0.3 * (r * 0.06 + 0.15);
    const rz = (Math.random() - 0.5) * 0.3 * (r * 0.12 + 0.3);
    pos[i * 3] = Math.cos(a) * r + rx;
    pos[i * 3 + 1] = ry;
    pos[i * 3 + 2] = Math.sin(a) * r + rz;
    const t = r / R;
    c.setHSL(0.6 + t * 0.25, 0.7 + t * 0.2, 0.65 + (1 - t) * 0.35);
    col[i * 3] = c.r; col[i * 3 + 1] = c.g; col[i * 3 + 2] = c.b;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('color', new THREE.BufferAttribute(col, 3));
  const mat = new THREE.PointsMaterial({
    size: 0.1, sizeAttenuation: true, vertexColors: true,
    transparent: true, opacity: 0.7, depthWrite: false, blending: THREE.AdditiveBlending,
  });
  return new THREE.Points(geo, mat);
}
const galaxy = makeGalaxy();
scene.add(galaxy);

// ============================================================
//  PLANET SYSTEM
// ============================================================
const planetMeshes = {};    // id -> mesh
const planetData = {};      // id -> { config, agents, ... }
const orbitRings = [];
const CLICKABLE = [];
const glowSprites = {};
let agentProgress = {};

function getOrbitConfig(index, total) {
  if (index === 0) return { orbitR: 0, orbitSpeed: 0, orbitPhase: 0, size: 1.3 };
  const baseR = 4 + (index - 1) * 4.5;
  const speed = 0.2 / (1 + index * 0.3);
  const phase = (index * 2.4) % (Math.PI * 2);
  const size = 0.7 + Math.random() * 0.4;
  return { orbitR: baseR, orbitSpeed: speed, orbitPhase: phase, size };
}

function makeGlowTexture(color) {
  const cv = document.createElement('canvas');
  cv.width = cv.height = 128;
  const ctx = cv.getContext('2d');
  const g = ctx.createRadialGradient(64, 64, 0, 64, 64, 64);
  g.addColorStop(0, color + 'cc');
  g.addColorStop(0.4, color + '44');
  g.addColorStop(1, color + '00');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, 128, 128);
  return new THREE.CanvasTexture(cv);
}

function buildGalaxyScene(state) {
  // Clear existing planets
  CLICKABLE.length = 0;
  Object.keys(planetMeshes).forEach(k => { scene.remove(planetMeshes[k]); delete planetMeshes[k]; });
  orbitRings.forEach(r => scene.remove(r));
  orbitRings.length = 0;
  document.getElementById('labels').innerHTML = '';

  const projectIds = Object.keys(state.projects);
  // Put orchestrator first if exists
  const orchIdx = projectIds.findIndex(id => state.projects[id].isOrchestrator);
  if (orchIdx > 0) {
    const [orch] = projectIds.splice(orchIdx, 1);
    projectIds.unshift(orch);
  }

  projectIds.forEach((id, i) => {
    const proj = state.projects[id];
    const color = PLANET_COLORS[i % PLANET_COLORS.length];
    const statusColor = STATUS_COLORS[proj.status] || STATUS_COLORS.unknown;
    const cfg = getOrbitConfig(i, projectIds.length);

    planetData[id] = { ...proj, id, color, statusColor, cfg, agents: proj.agents || [] };

    // Orbit ring
    if (cfg.orbitR > 0) {
      const ringGeo = new THREE.TorusGeometry(cfg.orbitR, 0.01, 2, 180);
      const ringMat = new THREE.MeshBasicMaterial({
        color: new THREE.Color(color), transparent: true, opacity: 0.08, side: THREE.DoubleSide,
      });
      const ring = new THREE.Mesh(ringGeo, ringMat);
      ring.rotation.x = Math.PI / 2;
      scene.add(ring);
      orbitRings.push(ring);
    }

    // Planet sphere
    const col = new THREE.Color(color);
    const geo = new THREE.SphereGeometry(cfg.size, 32, 32);
    const mat = new THREE.MeshStandardMaterial({
      color: col, roughness: 0.4, metalness: 0.25,
      emissive: col, emissiveIntensity: proj.isOrchestrator ? 0.35 : 0.2,
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.userData = { id };

    if (cfg.orbitR > 0) {
      mesh.position.x = Math.cos(cfg.orbitPhase) * cfg.orbitR;
      mesh.position.z = Math.sin(cfg.orbitPhase) * cfg.orbitR;
    }
    scene.add(mesh);
    planetMeshes[id] = mesh;
    CLICKABLE.push(mesh);

    // Glow sprite
    const glowTex = makeGlowTexture(color);
    const glowSp = new THREE.Sprite(new THREE.SpriteMaterial({
      map: glowTex, transparent: true, opacity: 0.45,
      depthWrite: false, blending: THREE.AdditiveBlending,
    }));
    const gs = cfg.size * 4.5;
    glowSp.scale.set(gs, gs, 1);
    mesh.add(glowSp);
    glowSprites[id] = glowSp;

    // Status ring around planet
    const srGeo = new THREE.TorusGeometry(cfg.size * 1.3, 0.03, 2, 64);
    const srMat = new THREE.MeshBasicMaterial({
      color: new THREE.Color(statusColor), transparent: true, opacity: 0.5, side: THREE.DoubleSide,
    });
    const statusRing = new THREE.Mesh(srGeo, srMat);
    statusRing.rotation.x = Math.PI / 2;
    mesh.add(statusRing);

    // Agent satellites
    const agents = proj.agents || [];
    const activeAgents = agents.filter(a => a.state === 'working' || a.state === 'talking');
    activeAgents.forEach((ag, ai) => {
      const moonR = cfg.size * 1.7 + ai * 0.3;
      const moonGeo = new THREE.SphereGeometry(0.07, 8, 8);
      const moonColor = ag.state === 'working' ? 0x3FB950 : 0x58A6FF;
      const moonMat = new THREE.MeshBasicMaterial({ color: moonColor, transparent: true, opacity: 0.9 });
      const moon = new THREE.Mesh(moonGeo, moonMat);
      moon.userData = { moonR, moonSpd: 1.2 + ai * 0.5, moonPh: ai * 2.1 };
      mesh.add(moon);

      // Moon trail
      const trailGeo = new THREE.TorusGeometry(moonR, 0.005, 2, 64);
      const trailMat = new THREE.MeshBasicMaterial({ color: moonColor, transparent: true, opacity: 0.15 });
      const trail = new THREE.Mesh(trailGeo, trailMat);
      trail.rotation.x = Math.PI / 2;
      mesh.add(trail);
    });

    // Orchestrator center ring
    if (proj.isOrchestrator) {
      const crGeo = new THREE.TorusGeometry(1.8, 0.15, 2, 120);
      const crMat = new THREE.MeshBasicMaterial({
        color: new THREE.Color(color), transparent: true, opacity: 0.25, side: THREE.DoubleSide,
      });
      const cRing = new THREE.Mesh(crGeo, crMat);
      cRing.rotation.x = Math.PI / 2.5;
      cRing.userData = { centerRing: true };
      mesh.add(cRing);
    }

    // HTML label
    const div = document.createElement('div');
    div.className = 'plabel';
    div.id = `lbl-${id}`;
    const hasActive = agents.some(a => a.state === 'working' || a.state === 'talking');
    div.innerHTML = `
      <div class="pl-name" style="color:${color}">${proj.name || id}</div>
      <div class="pl-sub">
        <div class="pl-dot" style="background:${hasActive ? statusColor : '#8B949E'}"></div>
        ${agents.length} agent${agents.length !== 1 ? 's' : ''}
      </div>
    `;
    div.style.opacity = '0';
    document.getElementById('labels').appendChild(div);
  });
}

// ============================================================
//  RAYCASTER
// ============================================================
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2(-9, -9);

canvas.addEventListener('click', e => {
  mouse.x = (e.clientX / innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(CLICKABLE);
  if (hits.length) {
    const id = hits[0].object.userData.id;
    if (id && planetData[id]) {
      openPanel(id);
    }
  }
});

// ============================================================
//  SIDE PANEL
// ============================================================
function openPanel(id) {
  const p = planetData[id];
  if (!p) return;
  selectedProject = id;

  document.getElementById('sp-icon').textContent = p.isOrchestrator ? '\u{1F3AF}' : '\u{1FA90}';
  document.getElementById('sp-icon').style.background = p.color + '22';
  document.getElementById('sp-name').textContent = p.name || id;
  document.getElementById('sp-meta').textContent = `${(p.agents || []).length} agents -- ${p.status}`;
  document.getElementById('sp-status').textContent = p.status;
  document.getElementById('sp-status').style.color = p.statusColor;
  document.getElementById('sp-backlog').textContent = p.backlogCount ?? '--';
  document.getElementById('sp-cycle').textContent = p.lastCycle || '--';
  document.getElementById('sp-bugs').textContent = p.bugFixedToday ?? 0;

  // Agent cards
  const agents = p.agents || [];
  document.getElementById('sp-agents').innerHTML = agents.map(ag => {
    const prog = (agentProgress[ag.id] || 0) * 100;
    const showProg = ag.state === 'working' || ag.state === 'talking';
    const init = (ag.name || '?')[0].toUpperCase();
    return `<div class="ag-card ${ag.state}">
      <div class="ag-row">
        <div class="ag-av" style="background:${p.color}22;color:${p.color}">
          ${init}<div class="ag-ring"></div>
        </div>
        <div>
          <div class="ag-nm">${ag.name}${ag.state === 'sleeping' ? ' <span style="opacity:.4;font-size:9px">zZz</span>' : ''}</div>
          <div class="ag-st">${stateLabel(ag.state)}</div>
        </div>
      </div>
      <div class="ag-task">${ag.lastTask || '--'}</div>
      ${showProg ? `<div class="ag-prog"><div class="ag-bar" id="agb-${ag.id.replace(/[^a-z0-9]/gi, '_')}" style="width:${prog.toFixed(1)}%;background:${p.color}"></div></div>` : ''}
    </div>`;
  }).join('');

  logItems = [
    { a: 'System', m: `Inspecting ${p.name || id}`, t: ts() },
    ...agents.map(ag => ({ a: ag.name, m: ag.lastTask || 'Idle', t: ts() })),
  ];
  renderLog(p);
  document.getElementById('sidepanel').classList.add('open');

  // Focus camera on planet
  const mesh = planetMeshes[id];
  if (mesh) {
    controls.target.lerp(mesh.position, 0.5);
  }
}

function closePanel() {
  document.getElementById('sidepanel').classList.remove('open');
  selectedProject = null;
  controls.target.set(0, 0, 0);
}

function stateLabel(s) {
  return ({ working: 'Working', idle: 'Idle', sleeping: 'Sleeping', talking: 'Communicating' })[s] || s;
}

function renderLog(p) {
  const cnt = logItems.filter(e => e.a !== 'System').length;
  document.getElementById('log-cnt').textContent = cnt + ' events';
  document.getElementById('log-list').innerHTML = logItems.slice(0, 12).map(e => `
    <div class="log-row">
      <div class="log-t">${e.t}</div>
      <div class="log-a" style="color:${p?.color || '#888'}">${e.a}</div>
      <div class="log-m">${e.m}</div>
    </div>
  `).join('');
}

function addLog(agent, msg) {
  logItems.unshift({ a: agent, m: msg, t: ts() });
  if (logItems.length > 30) logItems.pop();
  if (selectedProject && planetData[selectedProject]) renderLog(planetData[selectedProject]);
}

// ============================================================
//  UPDATE UI FROM STATE
// ============================================================
function updateMetrics(sys) {
  if (!sys) return;
  const cpu = parseFloat(sys.cpu) || 0;
  const ram = parseFloat(sys.ram) || 0;
  const disk = parseFloat(sys.disk) || 0;
  document.getElementById('b-cpu').style.width = cpu + '%';
  document.getElementById('b-ram').style.width = ram + '%';
  document.getElementById('b-disk').style.width = disk + '%';
  document.getElementById('v-cpu').textContent = cpu.toFixed(1) + '%';
  document.getElementById('v-ram').textContent = ram.toFixed(0) + '%';
  document.getElementById('v-disk').textContent = disk.toFixed(0) + '%';
}

function updateBottomBar(state) {
  const projects = state.projects || {};
  let healthy = 0, warning = 0, critical = 0;
  Object.values(projects).forEach(p => {
    if (p.status === 'healthy') healthy++;
    else if (p.status === 'warning') warning++;
    else if (p.status === 'critical') critical++;
  });
  document.getElementById('bb-healthy').textContent = healthy;
  document.getElementById('bb-warning').textContent = warning;
  document.getElementById('bb-critical').textContent = critical;
}

function setConnectionStatus(connected) {
  const el = document.getElementById('conn-status');
  if (connected) {
    el.className = 'conn-status connected';
    el.textContent = usingDemo ? 'Demo Mode' : 'Live';
  } else {
    el.className = 'conn-status disconnected';
    el.textContent = 'Disconnected';
  }
}

let tickerIdx = 0;
function rotateTicker() {
  const notifs = galaxiaState?.notifications || DEMO_DATA.notifications;
  if (!notifs || notifs.length === 0) return;
  tickerIdx = (tickerIdx + 1) % notifs.length;
  document.getElementById('ticker').innerHTML = `<span>${notifs[tickerIdx]}</span>`;
}

// ============================================================
//  DATA FETCHING
// ============================================================
async function fetchStatus() {
  try {
    const res = await fetch('/api/status');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    galaxiaState = data;
    usingDemo = false;
    applyState(data);
    setConnectionStatus(true);
  } catch {
    // Use demo data
    galaxiaState = DEMO_DATA;
    usingDemo = true;
    applyState(DEMO_DATA);
    setConnectionStatus(true);
  }
}

function connectSSE() {
  try {
    eventSource = new EventSource('/events');
    eventSource.onmessage = (e) => {
      try {
        const data = JSON.parse(e.data);
        galaxiaState = data;
        usingDemo = false;
        applyState(data);
        setConnectionStatus(true);
      } catch { /* ignore parse errors */ }
    };
    eventSource.onerror = () => {
      eventSource.close();
      eventSource = null;
      // Retry after 10s
      setTimeout(connectSSE, 10000);
    };
  } catch {
    setTimeout(connectSSE, 10000);
  }
}

function applyState(state) {
  updateMetrics(state.system);
  updateBottomBar(state);
  buildGalaxyScene(state);
}

// ============================================================
//  ANIMATION LOOP
// ============================================================
let elapsed = 0;
const tmpV = new THREE.Vector3();
const projV = new THREE.Vector3();
let lastMsgAt = 0;
let nextMsgIn = rnd(6000, 12000);

function animate(t) {
  requestAnimationFrame(animate);
  const dt = Math.min(t - elapsed, 50);
  elapsed = t;

  controls.update();

  // Orbit planets
  Object.keys(planetData).forEach(id => {
    const mesh = planetMeshes[id];
    if (!mesh) return;
    const cfg = planetData[id].cfg;
    if (cfg.orbitR > 0) {
      const a = cfg.orbitPhase + elapsed * 0.001 * cfg.orbitSpeed;
      mesh.position.x = Math.cos(a) * cfg.orbitR;
      mesh.position.z = Math.sin(a) * cfg.orbitR;
    }
    mesh.rotation.y += dt * 0.0008;

    // Animate moons
    mesh.children.forEach(ch => {
      if (ch.userData.moonR) {
        const mp = ch.userData.moonPh + elapsed * 0.001 * ch.userData.moonSpd;
        ch.position.x = Math.cos(mp) * ch.userData.moonR;
        ch.position.z = Math.sin(mp) * ch.userData.moonR;
        ch.position.y = Math.sin(mp * 0.7) * 0.15;
      }
      if (ch.userData.centerRing) ch.rotation.z += dt * 0.0005;
    });

    // Glow pulse
    if (glowSprites[id]) {
      const pulse = Math.sin(elapsed * 0.002 + (planetData[id].cfg.orbitPhase || 0)) * 0.08 + 1;
      glowSprites[id].material.opacity = 0.45 * pulse;
    }
  });

  // Rotate galaxy
  galaxy.rotation.y += dt * 0.00003;
  starfield.rotation.y += dt * 0.000005;

  // Update HTML labels
  Object.keys(planetData).forEach(id => {
    const el = document.getElementById(`lbl-${id}`);
    if (!el) return;
    const mesh = planetMeshes[id];
    if (!mesh) return;
    tmpV.copy(mesh.position);
    projV.copy(tmpV).project(camera);
    const sx = (projV.x * 0.5 + 0.5) * innerWidth;
    const sy = (-(projV.y * 0.5 - 0.5)) * (innerHeight - 100) + 56;
    const cfg = planetData[id].cfg;
    const behind = projV.z > 1;
    el.style.display = behind ? 'none' : 'block';
    el.style.left = sx + 'px';
    el.style.top = (sy - cfg.size * 45) + 'px';
    el.style.opacity = '1';
  });

  // Progress animation for agents
  Object.keys(planetData).forEach(id => {
    const agents = planetData[id].agents || [];
    agents.forEach(ag => {
      if (ag.state === 'working' || ag.state === 'talking') {
        agentProgress[ag.id] = (agentProgress[ag.id] || 0) + dt * 0.00006;
        if (agentProgress[ag.id] > 1) agentProgress[ag.id] = 0;
        const barId = 'agb-' + ag.id.replace(/[^a-z0-9]/gi, '_');
        const bar = document.getElementById(barId);
        if (bar) bar.style.width = (agentProgress[ag.id] * 100).toFixed(1) + '%';
      }
    });
  });

  // Periodic activity messages
  lastMsgAt += dt;
  if (selectedProject && lastMsgAt >= nextMsgIn) {
    const p = planetData[selectedProject];
    if (p) {
      const agents = (p.agents || []).filter(a => a.state !== 'sleeping');
      if (agents.length) {
        const ag = agents[Math.floor(Math.random() * agents.length)];
        const msg = Math.random() < 0.4 ? (ag.lastTask || '...') : MSG_POOL[Math.floor(Math.random() * MSG_POOL.length)];
        addLog(ag.name, msg);
      }
    }
    lastMsgAt = 0;
    nextMsgIn = rnd(6000, 12000);
  }

  renderer.render(scene, camera);
}

// ============================================================
//  UTILS
// ============================================================
function rnd(a, b) { return a + Math.random() * (b - a); }
function ts() {
  const d = new Date();
  return [d.getHours(), d.getMinutes(), d.getSeconds()]
    .map(n => String(n).padStart(2, '0')).join(':');
}

// ============================================================
//  RESIZE
// ============================================================
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ============================================================
//  KEYBOARD
// ============================================================
window.addEventListener('keydown', e => {
  if (e.key === 'Escape') closePanel();
});

// ============================================================
//  INIT
// ============================================================
fetchStatus();
connectSSE();
setInterval(rotateTicker, 5000);
requestAnimationFrame(animate);

</script>
